<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LeafID — Abrir la app</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; text-align: center;
      background: #0B0F08; color: #F2F5E7; min-height: 100vh; box-sizing: border-box; }
    h1 { font-size: 1.25rem; font-weight: 700; }
    p { max-width: 28rem; margin: 12px auto; line-height: 1.45; color: #A9ADA0; font-size: 0.95rem; }
    a.cta {
      display: inline-block; margin-top: 20px; padding: 16px 28px;
      background: #93BC10; color: #121212; font-weight: 700; font-size: 1.05rem;
      text-decoration: none; border-radius: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    a.cta:active { opacity: 0.9; }
    .note { font-size: 0.85rem; margin-top: 24px; color: #6b6f66; }
  </style>
</head>
<body>
  <h1>Volver a LeafID</h1>
  <p id="msg">Toca el botón para abrir la app y terminar de cambiar tu contraseña.</p>
  <p id="btnWrap" style="display:none;">
    <a id="openApp" class="cta" href="#">Abrir LeafID</a>
  </p>
  <p class="note" id="hint"></p>
  <script>
(function () {
  var hash = window.location.hash || "";
  var params = hash.length > 1 ? hash.slice(1) : "";

  if (!params) {
    document.getElementById("msg").textContent =
      "No hay datos de sesión en este enlace. Pide un correo nuevo desde la app (Recuperar contraseña).";
    return;
  }

  var deepLink = "com.marianaminafro.leafid://reset-password?" + params;

  var a = document.getElementById("openApp");
  a.setAttribute("href", deepLink);
  document.getElementById("btnWrap").style.display = "block";

  document.getElementById("hint").innerHTML =
    "Si Safari mostró un error al abrir solo, <strong>siempre usa este botón</strong>. " +
    "No usamos redirección automática: en iOS suele fallar con enlaces largos.";
})();
  </script>
</body>
</html>
