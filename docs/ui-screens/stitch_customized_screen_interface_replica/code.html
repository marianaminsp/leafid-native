<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600&amp;family=Manrope:wght@200;400;600;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#30372d",
                        "primary": "#a7da49",
                        "surface-dim": "#0f150d",
                        "tertiary-fixed-dim": "#ffabf0",
                        "surface-container-low": "#171d15",
                        "on-primary-container": "#324900",
                        "on-tertiary-container": "#780874",
                        "on-tertiary-fixed": "#390036",
                        "surface": "#0f150d",
                        "on-surface-variant": "#c3c9b2",
                        "inverse-surface": "#dee5d7",
                        "secondary-fixed-dim": "#b7cf8b",
                        "secondary": "#b7cf8b",
                        "on-secondary-fixed": "#131f00",
                        "primary-fixed": "#bff45f",
                        "on-secondary": "#243602",
                        "surface-container-highest": "#30372d",
                        "on-background": "#dee5d7",
                        "outline": "#8d937e",
                        "secondary-container": "#3a4d17",
                        "on-surface": "#dee5d7",
                        "on-secondary-fixed-variant": "#3a4d17",
                        "outline-variant": "#434937",
                        "surface-tint": "#a4d745",
                        "tertiary-fixed": "#ffd7f4",
                        "on-primary-fixed-variant": "#354e00",
                        "on-tertiary-fixed-variant": "#7e1279",
                        "error": "#ffb4ab",
                        "tertiary": "#ffb1f0",
                        "inverse-on-surface": "#2c3229",
                        "surface-container-high": "#252c23",
                        "on-primary": "#243600",
                        "inverse-primary": "#486800",
                        "surface-bright": "#343b31",
                        "surface-container-lowest": "#0a1008",
                        "primary-fixed-dim": "#a4d745",
                        "on-error-container": "#ffdad6",
                        "background": "#0f150d",
                        "on-secondary-container": "#a6be7b",
                        "on-tertiary": "#5c0059",
                        "on-error": "#690005",
                        "secondary-fixed": "#d3eca5",
                        "on-primary-fixed": "#131f00",
                        "surface-container": "#1b2119",
                        "primary-container": "#8dbe2e",
                        "tertiary-container": "#f984ea",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .scanning-dots {
            background-image: radial-gradient(circle, #ffffff 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            50% { top: 100%; }
            95% { opacity: 1; }
            100% { top: 0%; opacity: 0; }
        }
        .animate-scan {
            animation: scan 6s linear infinite;
        }
        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .animate-ring {
            animation: ring-pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .animate-twinkle {
            animation: twinkle 3s ease-in-out infinite;
        }
        .tracking-premium {
            letter-spacing: -0.5px;
        }
        .text-11pt {
            font-size: 14.67px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body h-screen w-full overflow-hidden">
<!-- Camera Feed Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]" data-alt="extreme macro close-up of a vibrant green monstera leaf with intricate vein patterns and soft natural forest lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvxUNDnXTNmJY0_G-vitQfUVasopcts0TneVzlPqXPv7i8kDNOS4BlmlXi4fALSaB6D0uumTgHFWgQA8_x0MD16a8C1n0jQ1YU9BwZEHJ0RbVQYjjIQCB4ChAvOZnPBLkHgoLNhl_xOWQ-nr1u8rsAfZlQtRRCdGlvUdQhHmk6qrrOMEcKjINYjTurEcxqJ-FQlP2pTNsH-ItEfPQoF5wxU-imwyg5gRrH7Mer7qlA2pgqhHN2ZxH59230QwnfLUvak6uFGQHJ7TSL"/>
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
</div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center p-6">
<div class="flex items-center justify-center w-10 h-10 rounded-full active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined text-white/90 !text-[24px]">close</span>
</div>
<!-- Analyzing Pill -->
<div class="flex items-center gap-2 px-4 py-2 bg-black/80 backdrop-blur-md rounded-full border border-primary/20 shadow-xl">
<div class="relative flex items-center justify-center w-2 h-2">
<div class="absolute w-2 h-2 rounded-full bg-primary z-10"></div>
<div class="absolute w-2 h-2 rounded-full bg-primary/60 animate-ring"></div>
</div>
<span class="font-headline text-[14px] font-semibold tracking-premium text-primary uppercase">ANALYZING LEAF...</span>
</div>
<div class="flex items-center justify-center w-10 h-10 rounded-full active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined text-white/90 !text-[24px]">share</span>
</div>
</header>
<!-- Main Viewfinder Area -->
<main class="relative z-10 h-full w-full flex flex-col items-center justify-center pointer-events-none">
<!-- Scanning Frame -->
<div class="relative w-72 h-96 md:w-96 md:h-[32rem]">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-2 border-l-2 border-primary rounded-tl-xl opacity-80"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-2 border-r-2 border-primary rounded-tr-xl opacity-80"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-2 border-l-2 border-primary rounded-bl-xl opacity-80"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-2 border-r-2 border-primary rounded-br-xl opacity-80"></div>
<!-- Scanning Data Points Overlay -->
<div class="absolute inset-4 opacity-20 mix-blend-overlay scanning-dots"></div>
<!-- Scanning Line (Laser) -->
<div class="absolute top-1/4 left-1/3 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_white] animate-twinkle"></div>
<!-- Randomized Data Points -->
<div class="absolute top-1/2 left-2/3 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_white] animate-twinkle [animation-delay:0.5s]"></div>
<div class="absolute bottom-1/4 left-1/2 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_white] animate-twinkle [animation-delay:1.2s]"></div>
<div class="absolute top-1/3 right-1/4 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_white] animate-twinkle [animation-delay:0.8s]"></div>
<div class="absolute bottom-1/3 left-1/4 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_white] animate-twinkle [animation-delay:1.8s]"></div>
<div class="absolute bottom-1/3 left-1/4 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_8px_white] opacity-60"></div>
</div>
<!-- Technical Readout Pill -->
<div class="mt-12 w-full max-w-sm px-8 pointer-events-auto">
<div class="flex justify-between items-end mb-2">
<span class="text-11pt font-body font-semibold tracking-[0.1em] text-on-surface-variant uppercase">Scanning Density</span>
<span class="text-11pt font-body font-semibold text-primary">72%</span>
</div>
<div class="h-1.5 w-full bg-surface-variant/30 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-primary w-[72%] rounded-full shadow-[0_0_12px_rgba(167,218,73,0.3)]"></div>
</div>
</div>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none border-[1.5rem] border-surface-dim/20 z-20"></div>
</body></html>
